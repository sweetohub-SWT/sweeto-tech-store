<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Premium squircle background -->
  <rect width="512" height="512" rx="140" fill="url(#bg)" />
  
  <!-- Beautiful modern "S" -->
  <text x="50%" y="54%" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="340" fill="url(#textGrad)" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)" letter-spacing="-10">S</text>
  
  <!-- Cyber-tech dot accent -->
  <circle cx="370" cy="380" r="32" fill="#38bdf8" />
  <circle cx="370" cy="380" r="12" fill="#ffffff" />
</svg>
